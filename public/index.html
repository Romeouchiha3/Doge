<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RM UCHIHA VIP — Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #030303; /* Pitch Black */
      color: #e0e0e0;
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(255, 0, 68, 0.1) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(200, 0, 0, 0.08) 0%, transparent 50%);
      animation: ambientLight 8s infinite alternate;
      overflow-x: hidden;
    }

    @keyframes ambientLight {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    /* Animated Header */
    .top-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(10, 0, 0, 0.8);
      border-bottom: 1px solid rgba(255, 0, 68, 0.4);
      padding: 15px 0;
      text-align: center;
      z-index: 100;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(255, 0, 68, 0.2);
      animation: slideDown 0.8s ease-out;
    }

    .top-header h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      color: #ff0044;
      letter-spacing: 4px;
      text-shadow: 0 0 10px rgba(255, 0, 68, 0.8);
    }

    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to { transform: translateY(0); }
    }

    /* Red Sharingan Background */
    .sharingan-bg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 550px;
      height: 550px;
      opacity: 0.15;
      pointer-events: none;
      animation: spin 20s linear infinite, pulseGlow 3s ease-in-out infinite alternate;
      z-index: 0;
      filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.9));
    }

    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    
    @keyframes pulseGlow {
      0% { opacity: 0.08; transform: translate(-50%, -50%) scale(0.95); }
      100% { opacity: 0.18; transform: translate(-50%, -50%) scale(1.05); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      margin-top: 60px;
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px;
      font-weight: 900;
      color: #ff0044; /* Uchiha Red */
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(255, 0, 68, 0.6), 0 0 20px rgba(255, 0, 68, 0.8), 0 0 40px rgba(255, 0, 0, 0.4);
      animation: textFlicker 4s infinite alternate;
    }

    @keyframes textFlicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 10px rgba(255,0,68,0.6), 0 0 20px rgba(255,0,68,0.8), 0 0 40px rgba(255,0,0,0.4); }
      20%, 24%, 55% { text-shadow: none; color: #550011; }
    }

    .logo span {
      font-size: 11px;
      color: #ff6688;
      letter-spacing: 3px;
      display: block;
      margin-top: 6px;
    }

    .disclaimer {
      background: rgba(255, 0, 68, 0.05);
      border: 1px dashed rgba(255, 0, 68, 0.4);
      border-left: 4px solid #ff0044;
      border-radius: 4px;
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: 11px;
      color: #ffb3c6;
      text-align: center;
      line-height: 1.5;
      box-shadow: 0 0 15px rgba(255, 0, 68, 0.1);
    }

    .disclaimer strong {
      display: block;
      font-size: 13px;
      margin-bottom: 5px;
      color: #ff0044;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .card {
      background: rgba(10, 5, 5, 0.7);
      border: 1px solid rgba(255, 0, 68, 0.3);
      border-radius: 12px;
      padding: 30px 25px;
      backdrop-filter: blur(15px);
      box-shadow: 0 0 30px rgba(255, 0, 68, 0.1), inset 0 0 20px rgba(255, 0, 68, 0.05);
      transition: box-shadow 0.3s ease;
    }
    
    .card:hover {
      box-shadow: 0 0 40px rgba(255, 0, 68, 0.2), inset 0 0 25px rgba(255, 0, 68, 0.1);
    }

    .tabs {
      display: flex;
      margin-bottom: 25px;
      border-bottom: 1px solid rgba(255, 0, 68, 0.2);
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      color: #662233;
      transition: all 0.3s ease;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .tab.active {
      color: #ff0044;
      border-bottom-color: #ff0044;
      text-shadow: 0 0 10px rgba(255, 0, 68, 0.5);
    }

    .form-section { display: none; }
    .form-section.active { display: block; animation: slideUp 0.4s ease forwards; }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      color: #ff6688;
      margin-bottom: 6px;
      font-family: 'Orbitron', sans-serif;
    }

    input, select {
      width: 100%;
      background: rgba(20, 0, 5, 0.6);
      border: 1px solid rgba(255, 0, 68, 0.3);
      border-radius: 6px;
      padding: 12px 14px;
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
    }
    
    select { cursor: pointer; appearance: none; }

    input:focus, select:focus {
      border-color: #ff0044;
      box-shadow: 0 0 15px rgba(255, 0, 68, 0.4), inset 0 0 5px rgba(255, 0, 68, 0.2);
    }

    button {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #990022, #ff0044);
      border: 1px solid #ff0044;
      border-radius: 6px;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      box-shadow: 0 4px 15px rgba(255, 0, 68, 0.3);
      text-transform: uppercase;
    }

    button:hover { 
      background: linear-gradient(135deg, #aa0022, #ff1a55); 
      box-shadow: 0 0 25px rgba(255, 0, 68, 0.6); 
      transform: translateY(-2px);
    }
    
    button:active { transform: translateY(1px); }
    button:disabled { background: #330011; color: #666; border-color: #440011; cursor: not-allowed; box-shadow: none; }

    .msg {
      margin-top: 14px;
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      display: none;
      animation: fadeIn 0.3s ease;
      font-family: 'Share Tech Mono', monospace;
    }

    .msg.error { background: rgba(255, 0, 0, 0.1); border: 1px solid rgba(255, 0, 0, 0.4); color: #ff4444; display: block; box-shadow: 0 0 10px rgba(255, 0, 0, 0.2); }
    .msg.success { background: rgba(0, 255, 100, 0.1); border: 1px solid rgba(0, 255, 100, 0.4); color: #00ff66; display: block; box-shadow: 0 0 10px rgba(0, 255, 100, 0.2); }

    .dashboard { display: none; }
    .dashboard.active { display: block; animation: slideUp 0.5s ease; }

    .dash-header {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      color: #ff0044;
      letter-spacing: 2px;
      margin-bottom: 20px;
      text-align: center;
      text-shadow: 0 0 10px rgba(255, 0, 68, 0.6);
      border-bottom: 1px solid rgba(255,0,68,0.2);
      padding-bottom: 10px;
    }

    .url-box {
      background: rgba(255, 0, 68, 0.08);
      border: 1px solid rgba(255, 0, 68, 0.4);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 18px;
      word-break: break-all;
      box-shadow: inset 0 0 15px rgba(255, 0, 68, 0.1);
      position: relative;
    }

    .url-box label {
      color: #ff0044;
      font-size: 11px;
      margin-bottom: 8px;
      text-shadow: 0 0 5px rgba(255, 0, 68, 0.4);
    }

    .url-text {
      font-size: 13px;
      color: #fff;
      line-height: 1.5;
      font-family: 'Share Tech Mono', monospace;
    }

    .copy-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 0, 68, 0.3);
      color: #ff6688;
      font-size: 11px;
      margin-top: 15px;
      box-shadow: none;
    }
    
    .copy-btn:hover { background: rgba(255, 0, 68, 0.2); color: #fff; }

    .logout-btn {
      background: transparent;
      border: 1px dashed rgba(255,255,255,0.2);
      color: #888;
      font-size: 11px;
      margin-top: 15px;
      box-shadow: none;
    }

    .logout-btn:hover { border-color: #ff0044; color: #ff0044; }

    .loading-dots::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }
    @keyframes dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }
  </style>
</head>
<body>

  <div class="top-header">
    <h2>RM UCHIHA VIP 🩸</h2>
  </div>

  <svg class="sharingan-bg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="100" cy="100" r="90" stroke="#ff0044" stroke-width="2"/>
    <circle cx="100" cy="100" r="60" stroke="#cc0033" stroke-width="1.5"/>
    <circle cx="100" cy="100" r="20" fill="#990022"/>
    <ellipse cx="100" cy="40" rx="8" ry="18" fill="#ff0044" transform="rotate(0 100 100)"/>
    <ellipse cx="100" cy="40" rx="8" ry="18" fill="#ff0044" transform="rotate(120 100 100)"/>
    <ellipse cx="100" cy="40" rx="8" ry="18" fill="#ff0044" transform="rotate(240 100 100)"/>
  </svg>

  <div class="container">
    <div class="logo">
      <h1>👁️‍🗨️ RM UCHIHA</h1>
      <span>MASTER CONTROL PANEL</span>
    </div>

    <div class="disclaimer">
      <strong>⚠️ Disclaimer</strong>
      This tool is made strictly for educational and ethical use. You are fully responsible for your actions. Misuse is prohibited.
    </div>

    <div class="card" id="authCard">
      <div class="tabs">
        <div class="tab active" id="tabLogin" onclick="switchTab('login')">LOGIN</div>
        <div class="tab" id="tabRegister" onclick="switchTab('register')">REGISTER</div>
      </div>

      <div class="form-section active" id="loginSection">
        <div class="field">
          <label>TELEGRAM CHAT ID</label>
          <input type="text" id="loginChatId" placeholder="Enter Chat ID" autocomplete="off"/>
        </div>
        <div class="field">
          <label>PASSWORD</label>
          <input type="password" id="loginPass" placeholder="Enter Password"/>
        </div>
        <button id="loginBtn" onclick="handleLogin()">AUTHENTICATE 🩸</button>
        <div class="msg" id="loginMsg"></div>
      </div>

      <div class="form-section" id="registerSection">
        <div class="field">
          <label>TELEGRAM CHAT ID</label>
          <input type="text" id="regChatId" placeholder="Your Chat ID" autocomplete="off"/>
        </div>
        <div class="field">
          <label>BOT TOKEN</label>
          <input type="text" id="regBotToken" placeholder="789...:AAH..." autocomplete="off"/>
        </div>
        <div class="field">
          <label>BOT NAME</label>
          <input type="text" id="regBotName" placeholder="e.g. MySpyBot" autocomplete="off"/>
        </div>
        <div class="field">
          <label>PASSWORD</label>
          <input type="password" id="regPass" placeholder="Create Password"/>
        </div>
        <button id="registerBtn" onclick="handleRegister()">ACTIVATE BOT 👁️‍🗨️</button>
        <div class="msg" id="registerMsg"></div>
      </div>
    </div>

    <div class="card dashboard" id="dashCard">
      <div class="dash-header">👁️‍🗨️ UCHIHA DASHBOARD</div>
      
      <div class="field">
        <label>SELECT YOUR BOT</label>
        <select id="botSelect" onchange="updateUrlDisplay()"></select>
      </div>

      <div id="urlSection">
        <div class="url-box" id="urlBox">
          <label>APP TARGET URL</label>
          <div class="url-text" id="urlDisplay">Please select a bot...</div>
        </div>
        <button class="copy-btn" onclick="copyUrl()">📋 COPY APP URL</button>
        <div class="msg" id="dashMsg"></div>
      </div>

      <button class="logout-btn" onclick="handleLogout()">LOGOUT SERVER</button>
    </div>
  </div>

  <script>
    // Supabase Config for Direct Frontend REST API (No separate backend routes needed!)
    const SUPABASE_URL = "https://nebwfonyhfgxnfkiisvs.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5lYndmb255aGZneG5ma2lpc3ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjc0MjMsImV4cCI6MjA5MDk0MzQyM30.me-P_mhC3droVGrHSlD_G3h9-ZgGgR3hy8VyDLFTp58";
    const BASE_URL = "https://doge-production-517d.up.railway.app";
    
    let userBots = []; // Array to hold all bots for logged in user
    let currentChatId = null;

    const headers = {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
    };

    function switchTab(tab) {
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
      document.getElementById('loginSection').classList.toggle('active', tab === 'login');
      document.getElementById('registerSection').classList.toggle('active', tab === 'register');
      document.querySelectorAll('.msg').forEach(m => m.className = 'msg');
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    async function handleRegister() {
      const chatId = document.getElementById('regChatId').value.trim();
      const botToken = document.getElementById('regBotToken').value.trim();
      const botName = document.getElementById('regBotName').value.trim();
      const password = document.getElementById('regPass').value.trim();

      if (!chatId || !botToken || !botName || !password) return showMsg('registerMsg', 'Fill all fields strictly.', 'error');
      
      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-dots">Validating Chakra</span>';

      try {
        // 1. Check if bot name already exists for this chat ID
        const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/rm-d?chat_id=eq.${chatId}&bot_name=eq.${encodeURIComponent(botName)}&select=*`, { headers });
        const existing = await checkRes.json();

        if (existing && existing.length > 0) {
            showMsg('registerMsg', 'Bot name already exists for this ID!', 'error');
        } else {
            // 2. Insert new Bot
            const generatedUrl = `${BASE_URL}/uid=${chatId}/${encodeURIComponent(botName)}`;
            const insertRes = await fetch(`${SUPABASE_URL}/rest/v1/rm-d`, {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({ chat_id: chatId, bot_token: botToken, bot_name: botName, password: password, generated_url: generatedUrl })
            });

            if (insertRes.ok) {
                showMsg('registerMsg', 'Bot Activated in Uchiha VIP 🩸', 'success');
                setTimeout(() => switchTab('login'), 2000);
            } else {
                showMsg('registerMsg', 'Database Rejection. Try again.', 'error');
            }
        }
      } catch (e) {
        showMsg('registerMsg', 'Server Connection Failed.', 'error');
      }
      btn.disabled = false;
      btn.textContent = 'ACTIVATE BOT 👁️‍🗨️';
    }

    async function handleLogin() {
      const chatId = document.getElementById('loginChatId').value.trim();
      const password = document.getElementById('loginPass').value.trim();
      
      if (!chatId || !password) return showMsg('loginMsg', 'Credentials missing.', 'error');
      
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-dots">Accessing Sharingan</span>';

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rm-d?chat_id=eq.${chatId}&password=eq.${encodeURIComponent(password)}&select=*`, { headers });
        const data = await res.json();

        if (data && data.length > 0) {
            userBots = data; // Save all user's bots
            currentChatId = chatId;
            showDashboard();
        } else {
            showMsg('loginMsg', 'Invalid ID or Password 🔴', 'error');
        }
      } catch (e) {
        showMsg('loginMsg', 'Network Disrupted.', 'error');
      }
      btn.disabled = false;
      btn.textContent = 'AUTHENTICATE 🩸';
    }

    function showDashboard() {
      document.getElementById('authCard').style.display = 'none';
      document.getElementById('dashCard').classList.add('active');
      
      const selectEl = document.getElementById('botSelect');
      selectEl.innerHTML = ''; // clear old

      userBots.forEach((botData, index) => {
          const opt = document.createElement('option');
          opt.value = index;
          opt.textContent = `🤖 ${botData.bot_name}`;
          selectEl.appendChild(opt);
      });

      updateUrlDisplay(); // Initial display update
    }

    function updateUrlDisplay() {
        const index = document.getElementById('botSelect').value;
        if(userBots[index]) {
            document.getElementById('urlDisplay').textContent = userBots[index].generated_url;
            document.getElementById('dashMsg').style.display = 'none';
        }
    }

    function copyUrl() {
      const url = document.getElementById('urlDisplay').textContent;
      navigator.clipboard.writeText(url).then(() => {
        showMsg('dashMsg', 'URL Copied for App Injection 🩸', 'success');
      });
    }

    function handleLogout() {
      userBots = [];
      currentChatId = null;
      document.getElementById('authCard').style.display = 'block';
      document.getElementById('dashCard').classList.remove('active');
      document.getElementById('loginPass').value = '';
      document.querySelectorAll('.msg').forEach(m => m.className = 'msg');
    }
  </script>
</body>
</html>
