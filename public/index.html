<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RM UCHIHA — Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #050914; /* Deep dark blue/black background */
      color: #e0e0e0;
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      /* Blue Sky Gradients & Lighting */
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0, 136, 255, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 191, 255, 0.1) 0%, transparent 50%);
      animation: ambientLight 10s infinite alternate;
    }

    @keyframes ambientLight {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    .sharingan-bg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      opacity: 0.08;
      pointer-events: none;
      animation: spin 30s linear infinite, pulseGlow 4s ease-in-out infinite alternate;
      z-index: 0;
      filter: drop-shadow(0 0 15px rgba(0, 136, 255, 0.8));
    }

    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    
    @keyframes pulseGlow {
      0% { opacity: 0.05; transform: translate(-50%, -50%) scale(0.95); }
      100% { opacity: 0.12; transform: translate(-50%, -50%) scale(1.05); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 24px;
      font-weight: 900;
      color: #00a8ff; /* Sky Blue */
      letter-spacing: 3px;
      /* Neon Blue Text Shadow */
      text-shadow: 0 0 10px rgba(0, 168, 255, 0.6), 0 0 20px rgba(0, 136, 255, 0.8), 0 0 40px rgba(0, 136, 255, 0.4);
      animation: textFlicker 3s infinite alternate;
    }

    @keyframes textFlicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 10px rgba(0,168,255,0.6), 0 0 20px rgba(0,136,255,0.8), 0 0 40px rgba(0,136,255,0.4); }
      20%, 24%, 55% { text-shadow: none; }
    }

    .logo span {
      font-size: 11px;
      color: #77b5fe;
      letter-spacing: 2px;
      display: block;
      margin-top: 4px;
      text-shadow: 0 0 8px rgba(119, 181, 254, 0.4);
    }

    .disclaimer {
      background: rgba(0, 136, 255, 0.05);
      border: 1px solid rgba(0, 136, 255, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: 11px;
      color: #80c1ff;
      text-align: center;
      line-height: 1.6;
      box-shadow: 0 0 15px rgba(0, 136, 255, 0.1);
    }

    .disclaimer strong {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      color: #00a8ff;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
    }

    .card {
      background: rgba(10, 20, 40, 0.6);
      border: 1px solid rgba(0, 168, 255, 0.25);
      border-radius: 12px;
      padding: 32px 28px;
      backdrop-filter: blur(15px);
      /* Blue outer and inner glow shadows */
      box-shadow: 0 0 30px rgba(0, 136, 255, 0.15), inset 0 0 20px rgba(0, 168, 255, 0.05);
      transition: box-shadow 0.3s ease;
    }
    
    .card:hover {
      box-shadow: 0 0 40px rgba(0, 136, 255, 0.25), inset 0 0 25px rgba(0, 168, 255, 0.1);
    }

    .tabs {
      display: flex;
      margin-bottom: 28px;
      border-bottom: 1px solid rgba(0, 168, 255, 0.15);
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: #557799;
      transition: all 0.3s ease;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .tab.active {
      color: #00a8ff;
      border-bottom-color: #00a8ff;
      text-shadow: 0 0 10px rgba(0, 168, 255, 0.5);
    }

    .form-section { display: none; }
    .form-section.active { display: block; animation: slideUp 0.4s ease forwards; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      color: #77b5fe;
      margin-bottom: 7px;
      font-family: 'Orbitron', sans-serif;
    }

    input {
      width: 100%;
      background: rgba(0, 20, 40, 0.4);
      border: 1px solid rgba(0, 168, 255, 0.2);
      border-radius: 6px;
      padding: 11px 14px;
      color: #e0e0e0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: rgba(0, 168, 255, 0.8);
      /* Blue input glow */
      box-shadow: 0 0 15px rgba(0, 168, 255, 0.3), inset 0 0 5px rgba(0, 168, 255, 0.2);
    }

    button {
      width: 100%;
      padding: 12px;
      /* Blue Sky Gradient */
      background: linear-gradient(135deg, #0055ff, #00a8ff);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 6px;
      box-shadow: 0 4px 15px rgba(0, 136, 255, 0.4);
    }

    button:hover { 
      background: linear-gradient(135deg, #0044cc, #0088ff); 
      box-shadow: 0 0 25px rgba(0, 168, 255, 0.6); 
      transform: translateY(-1px);
    }
    
    button:active {
      transform: translateY(1px);
      box-shadow: 0 2px 10px rgba(0, 136, 255, 0.4);
    }
    
    button:disabled { background: #001a33; color: #444; cursor: not-allowed; box-shadow: none; }

    .msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .msg.error { background: rgba(255, 50, 50, 0.15); border: 1px solid rgba(255, 50, 50, 0.3); color: #ff6b6b; display: block; box-shadow: 0 0 10px rgba(255, 50, 50, 0.2); }
    .msg.success { background: rgba(0, 180, 80, 0.15); border: 1px solid rgba(0, 180, 80, 0.3); color: #4dff91; display: block; box-shadow: 0 0 10px rgba(0, 180, 80, 0.2); }

    .dashboard {
      display: none;
    }

    .dashboard.active {
      display: block;
      animation: slideUp 0.5s ease;
    }

    .dash-header {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      color: #00a8ff;
      letter-spacing: 2px;
      margin-bottom: 20px;
      text-align: center;
      text-shadow: 0 0 8px rgba(0, 168, 255, 0.5);
    }

    .url-box {
      background: rgba(0, 136, 255, 0.08);
      border: 1px solid rgba(0, 168, 255, 0.3);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 18px;
      word-break: break-all;
      box-shadow: inset 0 0 15px rgba(0, 168, 255, 0.05);
    }

    .url-box label {
      color: #00a8ff;
      font-size: 10px;
      margin-bottom: 8px;
      text-shadow: 0 0 5px rgba(0, 168, 255, 0.3);
    }

    .url-text {
      font-size: 13px;
      color: #e0e0e0;
      line-height: 1.5;
    }

    .gen-btn {
      background: rgba(0, 136, 255, 0.15);
      border: 1px solid rgba(0, 168, 255, 0.4);
      color: #00a8ff;
      font-size: 11px;
      letter-spacing: 2px;
      margin-top: 0;
      box-shadow: 0 0 10px rgba(0, 136, 255, 0.2);
    }

    .gen-btn:hover { background: rgba(0, 136, 255, 0.25); box-shadow: 0 0 20px rgba(0, 168, 255, 0.4); color: #fff;}

    .copy-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #aaa;
      font-size: 11px;
      letter-spacing: 1px;
      margin-top: 10px;
      box-shadow: none;
    }
    
    .copy-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: #777;
      font-size: 10px;
      letter-spacing: 2px;
      margin-top: 14px;
      box-shadow: none;
    }

    .logout-btn:hover { background: rgba(255,50,50,0.1); border-color: rgba(255,50,50,0.3); color: #ff6b6b; box-shadow: 0 0 10px rgba(255,50,50,0.2); }

    .loading-dots::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }
  </style>
</head>
<body>

  <svg class="sharingan-bg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="100" cy="100" r="90" stroke="#00a8ff" stroke-width="2"/>
    <circle cx="100" cy="100" r="60" stroke="#0088ff" stroke-width="1.5"/>
    <circle cx="100" cy="100" r="20" fill="#0055ff"/>
    <ellipse cx="100" cy="40" rx="8" ry="18" fill="#00a8ff" transform="rotate(0 100 100)"/>
    <ellipse cx="100" cy="40" rx="8" ry="18" fill="#00a8ff" transform="rotate(120 100 100)"/>
    <ellipse cx="100" cy="40" rx="8" ry="18" fill="#00a8ff" transform="rotate(240 100 100)"/>
  </svg>

  <div class="container">
    <div class="logo">
      <h1>👁️‍🗨️ RM UCHIHA</h1>
      <span>REMOTE MANAGEMENT SYSTEM</span>
    </div>

    <div class="disclaimer">
      <strong>⚠️ DISCLAIMER</strong>
      Ethical use only. This tool is made for testing and ethical use, and you are responsible for your actions.
    </div>

    <div class="card" id="authCard">
      <div class="tabs">
        <div class="tab active" id="tabLogin" onclick="switchTab('login')">LOGIN</div>
        <div class="tab" id="tabRegister" onclick="switchTab('register')">REGISTER</div>
      </div>

      <div class="form-section active" id="loginSection">
        <div class="field">
          <label>TELEGRAM UID</label>
          <input type="text" id="loginUid" placeholder="Enter your Telegram UID" autocomplete="off"/>
        </div>
        <div class="field">
          <label>PASSWORD</label>
          <input type="password" id="loginPass" placeholder="Enter your password"/>
        </div>
        <button id="loginBtn" onclick="handleLogin()">LOGIN</button>
        <div class="msg" id="loginMsg"></div>
      </div>

      <div class="form-section" id="registerSection">
        <div class="field">
          <label>TELEGRAM UID</label>
          <input type="text" id="regUid" placeholder="Enter your Telegram UID" autocomplete="off"/>
        </div>
        <div class="field">
          <label>PASSWORD</label>
          <input type="password" id="regPass" placeholder="Create a password"/>
        </div>
        <button id="registerBtn" onclick="handleRegister()">REGISTER</button>
        <div class="msg" id="registerMsg"></div>
      </div>
    </div>

    <div class="card dashboard" id="dashCard">
      <div class="dash-header">👁️‍🗨️ DASHBOARD — <span id="dashUid"></span></div>

      <div id="urlSection">
        <div class="url-box" id="urlBox" style="display:none">
          <label>YOUR ASSIGNED URL</label>
          <div class="url-text" id="urlDisplay"></div>
        </div>
        <button class="gen-btn" id="genBtn" onclick="generateUrl()" style="display:none">👁️‍🗨️ GENERATE MY URL</button>
        <button class="copy-btn" id="copyBtn" onclick="copyUrl()" style="display:none">COPY URL</button>
        <div class="msg" id="dashMsg"></div>
      </div>

      <button class="logout-btn" onclick="handleLogout()">LOGOUT</button>
    </div>
  </div>

  <script>
    // Tumhari Supabase Config idhar add kardi gayi hai jaisa tumne kaha tha
    const SUPABASE_URL = "https://nebwfonyhfgxnfkiisvs.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5lYndmb255aGZneG5ma2lpc3ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjc0MjMsImV4cCI6MjA5MDk0MzQyM30.me-P_mhC3droVGrHSlD_G3h9-ZgGgR3hy8VyDLFTp58";
    
    const BASE_URL = "https://doge-production-517d.up.railway.app";
    let currentSession = null;

    function switchTab(tab) {
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
      document.getElementById('loginSection').classList.toggle('active', tab === 'login');
      document.getElementById('registerSection').classList.toggle('active', tab === 'register');
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    async function handleLogin() {
      const uid = document.getElementById('loginUid').value.trim();
      const password = document.getElementById('loginPass').value.trim();
      if (!uid || !password) return showMsg('loginMsg', 'Please fill in all fields.', 'error');
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-dots">Authenticating</span>';
      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uid, password })
        });
        const data = await res.json();
        if (!res.ok) {
          showMsg('loginMsg', data.error || 'Login failed.', 'error');
        } else {
          currentSession = { uid: data.uid, generated_url: data.generated_url };
          showDashboard();
        }
      } catch (e) {
        showMsg('loginMsg', 'Server error. Try again.', 'error');
      }
      btn.disabled = false;
      btn.textContent = 'LOGIN';
    }

    async function handleRegister() {
      const uid = document.getElementById('regUid').value.trim();
      const password = document.getElementById('regPass').value.trim();
      if (!uid || !password) return showMsg('registerMsg', 'Please fill in all fields.', 'error');
      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-dots">Registering</span>';
      try {
        const res = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uid, password })
        });
        const data = await res.json();
        if (!res.ok) {
          showMsg('registerMsg', data.error || 'Registration failed.', 'error');
        } else {
          showMsg('registerMsg', 'Registered successfully! You can now login.', 'success');
          setTimeout(() => switchTab('login'), 1500);
        }
      } catch (e) {
        showMsg('registerMsg', 'Server error. Try again.', 'error');
      }
      btn.disabled = false;
      btn.textContent = 'REGISTER';
    }

    function showDashboard() {
      document.getElementById('authCard').style.display = 'none';
      document.getElementById('dashCard').classList.add('active');
      document.getElementById('dashUid').textContent = currentSession.uid;

      if (currentSession.generated_url) {
        document.getElementById('urlBox').style.display = 'block';
        document.getElementById('urlDisplay').textContent = currentSession.generated_url;
        document.getElementById('copyBtn').style.display = 'block';
        document.getElementById('genBtn').style.display = 'none';
      } else {
        document.getElementById('urlBox').style.display = 'none';
        document.getElementById('genBtn').style.display = 'block';
        document.getElementById('copyBtn').style.display = 'none';
      }
    }

    async function generateUrl() {
      const btn = document.getElementById('genBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-dots">Generating</span>';
      try {
        const res = await fetch('/generate-url', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uid: currentSession.uid })
        });
        const data = await res.json();
        if (!res.ok) {
          showMsg('dashMsg', data.error || 'Failed to generate URL.', 'error');
        } else {
          currentSession.generated_url = data.generated_url;
          document.getElementById('urlBox').style.display = 'block';
          document.getElementById('urlDisplay').textContent = data.generated_url;
          document.getElementById('copyBtn').style.display = 'block';
          btn.style.display = 'none';
          showMsg('dashMsg', 'URL generated and permanently assigned.', 'success');
        }
      } catch (e) {
        showMsg('dashMsg', 'Server error. Try again.', 'error');
      }
      btn.disabled = false;
      btn.textContent = '👁️‍🗨️ GENERATE MY URL';
    }

    function copyUrl() {
      const url = document.getElementById('urlDisplay').textContent;
      navigator.clipboard.writeText(url).then(() => {
        showMsg('dashMsg', 'URL copied to clipboard!', 'success');
      });
    }

    function handleLogout() {
      currentSession = null;
      document.getElementById('authCard').style.display = 'block';
      document.getElementById('dashCard').classList.remove('active');
      document.getElementById('loginUid').value = '';
      document.getElementById('loginPass').value = '';
      document.getElementById('loginMsg').className = 'msg';
    }
  </script>
</body>
</html>
